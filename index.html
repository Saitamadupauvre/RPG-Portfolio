<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Protfolio</title>
  <link rel="stylesheet" href="./src/style.css">
  <link rel="stylesheet" href="./src/style/pixel-ui.css">
</head>

<body>
  <canvas class="webgl"></canvas>

  <div id="ui-container" class="state-loading pixel-ui">

    <div class="screen" id="loading-screen">
      <h1>Loading Universe...</h1>
      <div class="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </div>

    <div class="screen" id="menu-screen">
      <h1 class="title">SOLDIER'S PORTFOLIO</h1>
      <div class="menu-actions">
        <button class="btn" id="btn-enter-game">Game Mode</button>
        <button class="btn" id="btn-enter-classic">Fast Portfolio</button>
      </div>
    </div>

    <div class="screen" id="classic-screen">
      <h1 class="title">Projects</h1>
      <div id="classic-project-list"></div>
    </div>

    <div class="modal" id="project-modal">
      <div class="modal-content pixel-panel">
        <button id="btn-close-modal" class="close-btn">×</button>
        <div id="project-modal-body"></div>
      </div>
    </div>

  </div>

  <script type="module" src="./src/main.ts"></script>
</body>

</html>
